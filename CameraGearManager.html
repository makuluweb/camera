    --lr-accent-dim:   rgba(232,168,32,0.12);
    --lr-accent-ring:  rgba(232,168,32,0.25);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    font-size: 13px;
    background: var(--lr-bg);
    color: var(--lr-text);
    -webkit-font-smoothing: antialiased;
  }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: var(--lr-panel); }
  ::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

  /* ── Cards ───────────────────────────────────────────────────── */
  .gear-card { border-radius: 2px; }
  .gear-card:hover .gear-actions { opacity: 1; }
  .gear-actions { opacity: 0; transition: opacity 0.15s; }

  /* ── Photo drop zone ─────────────────────────────────────────── */
  .photo-drop-zone {

  .photo-drop-zone:hover, .photo-drop-zone.drag-over {

  .tab-active { border-bottom: 2px solid var(--lr-accent); color: var(--lr-accent); }

  /* ── Bag card ────────────────────────────────────────────────── */
  .bag-card { transition: outline 0.15s; border-radius: 2px; }

  /* ── Modal animations ────────────────────────────────────────── */
  .modal-overlay { animation: fadeIn 0.12s ease; }

  .btn-secondary {
    background: var(--lr-raised);

  }
  .btn-secondary:hover { background: var(--lr-hover); border-color: var(--lr-divider); }

  .btn-icon {

  /* ── Save status dot ─────────────────────────────────────────── */
  .save-dot { width: 6px; height: 6px; border-radius: 50%; display: inline-block; }
  .save-dot.saved   { background: #5a9a5a; }
  .save-dot.saving  { background: var(--lr-accent); animation: pulse 1s infinite; }
  .save-dot.error   { background: #c04040; }
  @keyframes pulse  { 0%,100%{opacity:1} 50%{opacity:0.35} }

  /* ── Loan cards ──────────────────────────────────────────────── */
  .loan-card { transition: outline 0.15s; }
  .loan-card:hover { outline: 1px solid #444; }
  .status-active   { background: rgba(180,60,60,0.15);  color: #d07070; border-color: rgba(180,60,60,0.3); }
  .status-returned { background: rgba(70,130,70,0.15);  color: #6aaa6a; border-color: rgba(70,130,70,0.3); }

  /* ── Section label style ─────────────────────────────────────── */
  .lr-label {
    font-size: 0.65rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--lr-muted);
    font-weight: 600;
  }

  /* ── Header panel line ───────────────────────────────────────── */
  .lr-header {
    background: #1a1a1a;

  /* ═══ Lightroom utility classes (replaces Tailwind grays/ambers) ══════════ */

  /* Backgrounds */
  .lr-bg            { background: #1c1c1c; }
  .lr-panel         { background: #252525; }
  .lr-raised        { background: #2d2d2d; }
  .lr-hover         { background: #363636; }
  .hover\:lr-hover:hover { background: #363636; }

  /* Borders */

  .lr-border-strong { border-color: #2a2a2a; }
  .lr-divider       { border-color: #464646; }

  /* Text */

  /* Accent (warm orange) */

  /* Ring / outline */
  .lr-ring { outline: 1px solid var(--lr-border); }

  .lr-radius      { border-radius: 2px; }

  .lr-shadow { box-shadow: 0 4px 24px rgba(0,0,0,0.6); }

  /* Category badge colors */

  /* Bag card colours — LR toned palette */
  /* Bag 0 — warm orange (LR accent) */
  .lr-bag-ring-0  { outline: 1px solid rgba(232,168,32,0.25); }

  .lr-bag-bdrh-0:hover { border-color: rgba(232,168,32,0.6); }

  .lr-bag-ring-1  { outline: 1px solid rgba(100,160,220,0.25); }

  /* Bag 2 — muted green */
  .lr-bag-ring-2  { outline: 1px solid rgba(90,150,90,0.25); }
  .lr-bag-hdr-2   { background: rgba(90,150,90,0.1); }

  /* Bag 3 — dusty rose */
  .lr-bag-ring-3  { outline: 1px solid rgba(180,90,90,0.25); }
  .lr-bag-hdr-3   { background: rgba(180,90,90,0.1); }

  .lr-bag-bg-3    { background: rgba(180,90,90,0.07); }

  /* Status badges */
  .lr-green-text   { color: #6aaa6a; }

<body style="background:#1c1c1c;color:#c8c8c8;min-height:100vh">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ═══════════════════════════════════════════════════════════════════════════
   CONSTANTS
═══════════════════════════════════════════════════════════════════════════ */
const CATEGORIES = [
  { id: 'camera-body', label: 'Camera Body', icon: '📷', color: 'lr-cat-camera' },
  { id: 'lens',        label: 'Lens',         icon: '🔭', color: 'lr-cat-lens'   },
  { id: 'battery',     label: 'Battery',      icon: '🔋', color: 'lr-cat-battery'},
  { id: 'bag',         label: 'Bag',          icon: '🎒', color: 'lr-cat-bag'    },
  { id: 'general',     label: 'Accessory',    icon: '🔧', color: 'lr-cat-general'},
];
const BAG_COLORS = [
  { ring: 'lr-bag-ring-0', header: 'lr-bag-hdr-0', text: 'lr-bag-txt-0', light: 'lr-bag-bg-0', border: 'lr-bag-bdr-0', borderHover: 'lr-bag-bdrh-0' },
  { ring: 'lr-bag-lr-ring', header: 'lr-bag-hdr-1', text: 'lr-bag-txt-1', light: 'lr-bag-bg-1', border: 'lr-bag-bdr-1', borderHover: 'lr-bag-bdrh-1' },
  { ring: 'lr-bag-ring-2', header: 'lr-bag-hdr-2', text: 'lr-bag-txt-2', light: 'lr-bag-bg-2', border: 'lr-bag-bdr-2', borderHover: 'lr-bag-bdrh-2' },
  { ring: 'lr-bag-ring-3', header: 'lr-bag-hdr-3', text: 'lr-bag-txt-3', light: 'lr-bag-bg-3', border: 'lr-bag-bdr-3', borderHover: 'lr-bag-bdrh-3' },
];
const DEFAULT_BAGS = [
  { id: 'bag1', name: 'Field Kit Alpha', gearIds: [] },
  { id: 'bag2', name: 'Field Kit Beta',  gearIds: [] },
  { id: 'bag3', name: 'Travel Kit',      gearIds: [] },
  { id: 'bag4', name: 'Studio Kit',      gearIds: [] },
];

// Loan record shape:
// { id, gearId, gearName, loanedTo, loanDate, returnedDate|null, notes }

const getCategoryInfo = (id) => CATEGORIES.find(c => c.id === id) || CATEGORIES[4];
const generateId = () => Math.random().toString(36).substring(2) + Date.now().toString(36);

/* ═══════════════════════════════════════════════════════════════════════════
   INDEXEDDB STORAGE
═══════════════════════════════════════════════════════════════════════════ */
const DB_NAME    = 'CameraGearDB';
const DB_VERSION = 1;
let _db = null;

const openDB = () => new Promise((resolve, reject) => {
  if (_db) return resolve(_db);
  const req = indexedDB.open(DB_NAME, DB_VERSION);
  req.onupgradeneeded = (e) => {
    const db = e.target.result;
    if (!db.objectStoreNames.contains('kv')) db.createObjectStore('kv');
  };
  req.onsuccess  = (e) => { _db = e.target.result; resolve(_db); };
  req.onerror    = (e) => reject(e.target.error);
});

const dbGet = async (key, fallback = null) => {
  try {
    const db = await openDB();
    return new Promise((res) => {
      const req = db.transaction('kv', 'readonly').objectStore('kv').get(key);
      req.onsuccess = () => res(req.result ?? fallback);
      req.onerror   = () => res(fallback);
    });
  } catch { return fallback; }
};

const dbSet = async (key, value) => {
  try {
    const db = await openDB();
    return new Promise((res, rej) => {
      const req = db.transaction('kv', 'readwrite').objectStore('kv').put(value, key);
      req.onsuccess = () => res();
      req.onerror   = () => rej(req.error);
    });
  } catch (e) { console.error('DB write error:', e); throw e; }
};

/* ═══════════════════════════════════════════════════════════════════════════
   IMAGE COMPRESSION
═══════════════════════════════════════════════════════════════════════════ */
const compressImage = (file, maxDim = 1400, quality = 0.82) =>
  new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = reject;
    reader.onload = (ev) => {
      const img = new Image();
      img.onerror = reject;
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width >= height) { height = Math.round(height * maxDim / width); width = maxDim; }
          else                  { width  = Math.round(width  * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });

/* ═══════════════════════════════════════════════════════════════════════════
   CLOUD BACKUP — File System Access API
═══════════════════════════════════════════════════════════════════════════ */
const CLOUD_SUPPORTED = typeof window !== 'undefined' && !!window.showSaveFilePicker;

const buildPayload = (gear, bags, loans = []) => ({
  version: 2,
  app: 'CameraGearManager',
  exportedAt: new Date().toISOString(),
  gear,
  bags,
  loans,
});

const cloudSave = async (gear, bags, loans = []) => {
  const opts = {
    suggestedName: `camera-gear-backup-${new Date().toISOString().slice(0,10)}.json`,
    types: [{ description: 'Camera Gear Backup', accept: { 'application/json': ['.json'] } }],
  };
  const handle = await window.showSaveFilePicker(opts);
  const writable = await handle.createWritable();
  await writable.write(JSON.stringify(buildPayload(gear, bags, loans), null, 2));
  await writable.close();
  try {
    if (handle.requestPermission) await handle.requestPermission({ mode: 'readwrite' });
    await dbSet('cloudFileHandle', handle);
  } catch {}
  return handle;
};

const cloudQuickSave = async (handle, gear, bags, loans = []) => {
  const perm = await handle.queryPermission({ mode: 'readwrite' });
  if (perm !== 'granted') {
    const req = await handle.requestPermission({ mode: 'readwrite' });
    if (req !== 'granted') throw new Error('Permission denied');
  }
  const writable = await handle.createWritable();
  await writable.write(JSON.stringify(buildPayload(gear, bags, loans), null, 2));
  await writable.close();
};

const cloudLoad = async () => {
  const [handle] = await window.showOpenFilePicker({
    types: [{ description: 'Camera Gear Backup', accept: { 'application/json': ['.json'] } }],
    multiple: false,
  });
  const file = await handle.getFile();
  const text = await file.text();
  return JSON.parse(text);
};

/* ═══════════════════════════════════════════════════════════════════════════
   SMALL COMPONENTS
═══════════════════════════════════════════════════════════════════════════ */
function GearPhoto({ photo, size = 'md', category }) {
  const cat = getCategoryInfo(category);
  if (photo) return (
    <img src={photo} alt=""
      className={size === 'sm'
        ? 'w-10 h-10 lr-radius object-cover'
        : 'w-full h-32 rounded-t-lg object-cover'}
    />
  );
  const sizes = { sm: 'w-10 h-10 text-xl', md: 'w-full h-32 text-4xl' };
  return (
    <div className={`${sizes[size]} flex items-center justify-center lr-raised ${size === 'sm' ? 'lr-radius' : 'rounded-t-lg'}`}>
      <span>{cat.icon}</span>
    </div>
  );
}

function Toast({ msg, onDone }) {
  useEffect(() => {
    const t = setTimeout(onDone, 4000);
    return () => clearTimeout(t);
  }, [msg]);
  if (!msg) return null;
  return (
    <div className={`fixed bottom-6 left-1/2 -translate-x-1/2 z-50 px-5 py-3 lr-radius lr-shadow text-sm font-medium border
      ${msg.type === 'success' ? 'lr-green-bg lr-green-border lr-green-text'
      : msg.type === 'error'   ? 'lr-red-bg lr-red-border lr-red-text'
                               : 'lr-blue-bg lr-blue-border lr-blue-text'}`}>
      {msg.text}
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   GEAR CARD
═══════════════════════════════════════════════════════════════════════════ */
function GearCard({ item, onEdit, onDelete, onAssign, bags }) {
  const cat = getCategoryInfo(item.category);
  const assignedBags = bags.filter(b => b.gearIds.includes(item.id));
  return (
    <div className="gear-card lr-panel lr-radius overflow-hidden relative group">
      <GearPhoto photo={item.photo} size="md" category={item.category} />
      <div className="gear-actions absolute top-2 right-2 flex gap-1">
        <button className="btn-icon text-xs" title="Assign to bag" onClick={() => onAssign(item)}>🎒</button>
        <button className="btn-icon text-xs" title="Edit"          onClick={() => onEdit(item)}>✏️</button>
        <button className="btn-icon text-xs lr-red-text"          onClick={() => onDelete(item.id)} title="Delete">🗑️</button>
      </div>
      <div className="p-3">
        <div className="flex items-start justify-between gap-2 mb-1">
          <h3 className="text-sm font-semibold lr-text-primary leading-tight">{item.name || 'Unnamed'}</h3>
          <span className={`category-badge px-1.5 py-0.5 lr-radius ${cat.color} shrink-0`}>{cat.label}</span>
        </div>
        {(item.make || item.model) && (
          <p className="text-xs lr-text-muted truncate">{[item.make, item.model].filter(Boolean).join(' · ')}</p>
        )}
        {item.serialNumber && (
          <p className="text-xs lr-text-dim mt-0.5 font-mono">S/N: {item.serialNumber}</p>
        )}
        {item.description && (
          <p className="text-xs lr-text-muted mt-1.5 line-clamp-2">{item.description}</p>
        )}
        {item.additionalPhotos?.some(p => p) && (
          <div className="mt-2 flex gap-1.5">
            {item.additionalPhotos.filter(p => p).map((p, i) => (
              <img key={i} src={p} alt="" className="w-12 h-9 object-cover lr-radius border lr-border" />
            ))}
          </div>
        )}
        {assignedBags.length > 0 && (
          <div className="mt-2 flex flex-wrap gap-1">
            {assignedBags.map(b => (
              <span key={b.id} className="text-xs lr-accent-dim lr-accent-text px-1.5 py-0.5 lr-radius">{b.name}</span>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   PHOTO SLOT
═══════════════════════════════════════════════════════════════════════════ */
function PhotoSlot({ value, onChange, label, height = 'h-48', uploading }) {
  const [drag, setDrag] = useState(false);
  const ref = useRef();

  const handle = async (file) => {
    if (!file || !file.type.startsWith('image/')) return;
    const compressed = await compressImage(file);
    onChange(compressed);
  };
  const onDrop = (e) => { e.preventDefault(); setDrag(false); handle(e.dataTransfer.files[0]); };

  return (
    <div>
      {label && <label className="lr-label block mb-1">{label}</label>}
      {value ? (
        <div className="relative">
          <img src={value} alt="" className={`w-full ${height} object-cover lr-radius`} />
          {uploading && (
            <div className="absolute inset-0 bg-black/50 lr-radius flex items-center justify-center">
              <span className="lr-text-primary text-sm">Compressing…</span>
            </div>
          )}
          <button onClick={() => onChange('')}
            className="absolute top-2 right-2 bg-red-600 lr-text-primary lr-radius-full w-6 h-6 flex items-center justify-center text-xs font-bold hover:bg-red-700">✕</button>
        </div>
      ) : (
        <div
          className={`photo-drop-zone lr-radius ${height} flex flex-col items-center justify-center cursor-pointer text-center ${drag ? 'drag-over' : ''}`}
          onClick={() => ref.current.click()}
          onDragOver={e => { e.preventDefault(); setDrag(true); }}
          onDragLeave={() => setDrag(false)}
          onDrop={onDrop}
        >
          <span className="text-3xl mb-1">📸</span>
          <p className="text-xs lr-text-muted">Click or drop</p>
        </div>
      )}
      <input ref={ref} type="file" accept="image/*" className="hidden" onChange={e => handle(e.target.files[0])} />
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   GEAR MODAL
═══════════════════════════════════════════════════════════════════════════ */
function GearModal({ item, onSave, onClose }) {
  const emptyForm = {
    name: '', category: 'camera-body', make: '', model: '',
    serialNumber: '', description: '', photo: '',
    additionalPhotos: ['', '', ''],
  };

  const [form, setForm] = useState(() => {
    if (!item) return emptyForm;
    return {
      ...emptyForm,
      ...item,
      additionalPhotos: item.additionalPhotos
        ? [...item.additionalPhotos, '', '', ''].slice(0, 3)
        : ['', '', ''],
    };
  });

  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));

  const setAdditional = (i, v) => setForm(f => {
    const ap = [...f.additionalPhotos];
    ap[i] = v;
    return { ...f, additionalPhotos: ap };
  });

  const handleSubmit = () => {
    if (!form.name.trim()) { alert('Please enter a name for this gear.'); return; }
    onSave({ ...form, id: form.id || generateId() });
  };

  return (
    <div className="modal-overlay fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4"
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-panel lr-panel lr-radius w-full max-w-lg max-h-[90vh] overflow-y-auto lr-shadow">
        <div className="flex items-center justify-between p-5 border-b lr-border">
          <h2 className="text-lg font-bold lr-text-primary">{item ? 'Edit Gear' : 'Add New Gear'}</h2>
          <button onClick={onClose} className="lr-text-muted hover:lr-text-primary text-xl leading-none">✕</button>
        </div>
        <div className="p-5 space-y-4">
          <PhotoSlot label="Cover Photo" value={form.photo} onChange={v => set('photo', v)} height="h-48" />
          <div>
            <label className="lr-label block mb-1">Category</label>
            <select value={form.category} onChange={e => set('category', e.target.value)}>
              {CATEGORIES.map(c => <option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}
            </select>
          </div>
          <div>
            <label className="lr-label block mb-1">Name <span className="lr-accent-text">*</span></label>
            <input type="text" placeholder="e.g. Sony Alpha 7 IV" value={form.name} onChange={e => set('name', e.target.value)} />
          </div>
          <div className="grid grid-cols-2 gap-3">
            <div>
              <label className="lr-label block mb-1">Make</label>
              <input type="text" placeholder="e.g. Sony" value={form.make} onChange={e => set('make', e.target.value)} />
            </div>
            <div>
              <label className="lr-label block mb-1">Model</label>
              <input type="text" placeholder="e.g. ILCE-7M4" value={form.model} onChange={e => set('model', e.target.value)} />
            </div>
          </div>
          <div>
            <label className="lr-label block mb-1">Serial Number</label>
            <input type="text" placeholder="e.g. 1234567" value={form.serialNumber} onChange={e => set('serialNumber', e.target.value)} style={{ fontFamily: 'monospace' }} />
          </div>
          <div>
            <label className="lr-label block mb-1">Additional Photos</label>
            <div className="grid grid-cols-3 gap-3">
              {[0, 1, 2].map(i => (
                <PhotoSlot key={i} value={form.additionalPhotos[i]} onChange={v => setAdditional(i, v)} height="h-24" />
              ))}
            </div>
          </div>
          <div>
            <label className="lr-label block mb-1">Description / Notes</label>
            <textarea
              placeholder="Condition, purchase date, accessories included..."
              value={form.description}
              onChange={e => set('description', e.target.value)}
              rows={3}
              style={{ resize: 'vertical' }}
            />
          </div>
        </div>
        <div className="flex justify-end gap-3 p-5 border-t lr-border">
          <button className="btn-secondary" onClick={onClose}>Cancel</button>
          <button className="btn-primary"   onClick={handleSubmit}>{item ? '💾 Save Changes' : '➕ Add Gear'}</button>
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   PACK BAG MODAL

    const ok = catFilter === 'all' || g.category === catFilter;

    return ok && (!q || g.name.toLowerCase().includes(q) || (g.make||'').toLowerCase().includes(q));

    <div className="modal-overlay fixed inset-0 bg-black/80 flex items-center justify-center z-50 p-4"

        <div className="flex items-center justify-between p-5 border-b lr-border">
          <div>
            <h2 className="text-base font-bold lr-text-primary">Pack Gear — "{bag.name}"</h2>
            <p className="text-xs lr-text-muted mt-0.5">{bag.gearIds.length} item{bag.gearIds.length !== 1 ? 's' : ''} packed</p>

          <button onClick={onClose} className="lr-text-muted hover:lr-text-primary text-xl leading-none">✕</button>
        </div>
        <div className="p-4 space-y-3 border-b lr-border">

          <div className="flex gap-2 flex-wrap">
            <button onClick={() => setCatFilter('all')}
              className={`text-xs px-2.5 py-1 lr-radius-full border transition-colors ${catFilter === 'all' ? 'lr-accent-bg lr-accent-border text-gray-900 font-semibold' : 'lr-border lr-text-muted'}`}>All</button>
            {CATEGORIES.map(c => (
              <button key={c.id} onClick={() => setCatFilter(c.id)}
                className={`text-xs px-2.5 py-1 lr-radius-full border transition-colors ${catFilter === c.id ? 'lr-accent-bg lr-accent-border text-gray-900 font-semibold' : 'lr-border lr-text-muted'}`}>
                {c.icon} {c.label}

          {filtered.length === 0 && <p className="text-center lr-text-dim text-sm py-8">No gear matches.</p>}
          {filtered.map(g => {
            const packed = bag.gearIds.includes(g.id);
            const cat = getCategoryInfo(g.category);
            return (
              <button key={g.id} onClick={() => onToggle(bag.id, g.id)}
                className={`w-full flex items-center gap-3 p-3 lr-radius border transition-all text-left
                  ${packed ? 'lr-accent-dimmer lr-accent-border/50' : 'lr-raised lr-border hover:lr-divider'}`}>

                  : <div className="w-10 h-10 lr-radius lr-hover flex items-center justify-center text-xl shrink-0">{cat.icon}</div>
                }
                <div className="flex-1 min-w-0">
                  <p className={`text-sm font-medium truncate ${packed ? 'lr-accent-text' : 'lr-text-primary'}`}>{g.name}</p>
                  <p className="text-xs lr-text-dim truncate">{[g.make, g.model].filter(Boolean).join(' · ') || cat.label}</p>
                </div>
                <span className={`text-sm shrink-0 ${packed ? 'lr-accent-text' : 'lr-text-dim'}`}>{packed ? '✓' : '+'}</span>
              </button>
            );
          })}
        </div>
        <div className="p-4 border-t lr-border">
          <button className="btn-primary w-full" onClick={onClose}>Done — {bag.gearIds.length} items packed</button>
        </div>
      </div>
    </div>
